<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&family=Ma+Shan+Zheng&family=Zhi+Mang+Xing&display=swap');

        /* ============================================================
           Scoped Variables & Reset
           ============================================================ */
        .jx-status-bar {
            --jx-text: #2c2416;
            --jx-text-sub: #6b5d4d;
            --jx-text-accent: #8b7355;
            --jx-divider: rgba(139, 115, 85, 0.2);
            --jx-tree-filter: invert(1) drop-shadow(0 0 6px rgba(30, 25, 15, 0.4)) drop-shadow(0 0 2px rgba(30, 25, 15, 0.6));
            --jx-glow: transparent;
        }

        .jx-status-bar.jx-night {
            --jx-text: #e8dcc8;
            --jx-text-sub: #b8a88a;
            --jx-text-accent: #d4b86a;
            --jx-divider: rgba(212, 184, 106, 0.2);
            --jx-tree-filter: invert(0) drop-shadow(0 0 12px rgba(212, 184, 106, 0.5)) drop-shadow(0 0 4px rgba(212, 184, 106, 0.3));
            --jx-glow: rgba(212, 184, 106, 0.1);
        }

        /* ---- Container: 3-column flex layout ---- */
        .jx-status-bar {
            position: relative;
            width: 100%;
            max-width: 780px;
            min-height: 340px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 20px auto 10px;
            padding: 0 3%;
            font-family: 'Noto Serif SC', serif;
            color: var(--jx-text);
            transition: color 0.8s ease;
        }

        .jx-status-bar *,
        .jx-status-bar *::before,
        .jx-status-bar *::after {
            margin: 0; padding: 0; box-sizing: border-box;
        }

        .jx-status-bar::before,
        .jx-status-bar::after {
            content: '';
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            width: 120px; height: 1px;
            background: linear-gradient(90deg, transparent, var(--jx-divider), transparent);
        }
        .jx-status-bar::before { top: 0; }
        .jx-status-bar::after { bottom: 0; }

        /* ============================================================
           Bodhi Tree (Center column)
           ============================================================ */
        .jx-tree-wrap {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            flex-shrink: 0;
        }

        .jx-tree-img {
            width: 180px; height: 180px;
            object-fit: contain;
            filter: var(--jx-tree-filter);
            transition: filter 0.8s ease, opacity 0.6s ease;
            opacity: 0.85;
            cursor: pointer;
            position: relative;
            z-index: 2;
            user-select: none;
        }
        .jx-tree-img:hover { opacity: 0.75; }
        .jx-tree-img.jx-faded { opacity: 0.15; }

        .jx-tree-glow {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -55%);
            width: 160px; height: 160px;
            border-radius: 50%;
            background: radial-gradient(circle, var(--jx-glow) 0%, transparent 70%);
            z-index: -1;
            transition: background 0.8s ease;
        }

        /* ============================================================
           Inner Monologue
           ============================================================ */
        .jx-mono-layer {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -55%);
            width: 160px; height: 160px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.6s ease;
        }
        .jx-mono-layer.jx-visible { opacity: 1; }

        .jx-mono-text {
            writing-mode: vertical-rl;
            text-orientation: mixed;
            font-family: 'Ma Shan Zheng', cursive;
            font-size: 13px;
            line-height: 2;
            letter-spacing: 2px;
            color: var(--jx-text-sub);
            max-height: 140px;
            text-align: center;
            animation: jx-breathe 4s ease-in-out infinite;
            transition: color 0.8s ease;
        }

        @keyframes jx-breathe {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        /* ============================================================
           Day/Night Toggle
           ============================================================ */
        .jx-toggle {
            position: absolute;
            bottom: 5px;
            left: 50%;
            transform: translateX(-50%);
            width: 40px; height: 40px;
            border-radius: 50%;
            border: none;
            background: transparent;
            color: var(--jx-text-accent);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: all 0.4s ease;
            z-index: 10;
            line-height: 1;
        }
        .jx-toggle:hover { transform: translateX(-50%) rotate(30deg) scale(1.2); opacity: 0.8; }
        .jx-toggle:active { transform: translateX(-50%) rotate(60deg) scale(0.95); }

        /* ============================================================
           Character Panels (flex items, no absolute positioning)
           ============================================================ */
        .jx-glyph {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
            z-index: 5;
            min-width: 60px;
            min-height: 280px;
            flex-shrink: 0;
        }

        /* ---- Big character ---- */
        .jx-big {
            font-family: 'Zhi Mang Xing', cursive;
            font-weight: 400;
            font-size: 64px;
            line-height: 1;
            color: var(--jx-text);
            transition: opacity 0.5s ease, transform 0.5s ease, color 0.8s ease;
            opacity: 0.8;
        }
        .jx-big:hover { opacity: 1; }

        .jx-glyph.jx-active .jx-big {
            opacity: 0;
            transform: scale(1.1);
            pointer-events: none;
            position: absolute;
        }

        /* ---- Content text ---- */
        .jx-content {
            opacity: 0;
            transform: scale(0.9);
            transition: opacity 0.5s ease 0.1s, transform 0.5s ease 0.1s;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: absolute;
        }

        .jx-glyph.jx-active .jx-content {
            opacity: 1;
            transform: scale(1);
            pointer-events: auto;
        }

        .jx-label {
            font-family: 'Ma Shan Zheng', cursive;
            font-size: 12px;
            color: var(--jx-text-sub);
            letter-spacing: 4px;
            margin-bottom: 10px;
            white-space: nowrap;
            transition: color 0.8s ease;
        }
        .jx-label::after {
            content: '';
            display: block;
            width: 30px; height: 1px;
            background: var(--jx-divider);
            margin: 6px auto 0;
        }

        .jx-text-gatha {
            writing-mode: vertical-rl;
            text-orientation: mixed;
            font-family: 'Ma Shan Zheng', cursive;
            font-size: 18px;
            line-height: 2;
            letter-spacing: 4px;
            color: var(--jx-text);
            max-height: 200px;
            overflow: hidden;
            text-align: justify;
            transition: color 0.8s ease;
        }

        .jx-text-jifeng {
            writing-mode: vertical-rl;
            text-orientation: mixed;
            font-family: 'Zhi Mang Xing', cursive;
            font-size: 20px;
            line-height: 1.8;
            letter-spacing: 3px;
            color: var(--jx-text);
            max-height: 200px;
            overflow: hidden;
            text-align: justify;
            transition: color 0.8s ease;
        }

        /* ============================================================
           Floating Particles
           ============================================================ */
        .jx-particle {
            position: absolute;
            width: 2px; height: 2px;
            border-radius: 50%;
            background: var(--jx-text-accent);
            opacity: 0;
            pointer-events: none;
            animation: jx-float 8s ease-in-out infinite;
        }
        .jx-particle:nth-child(1) { left: 20%; top: 30%; animation-delay: 0s; animation-duration: 7s; }
        .jx-particle:nth-child(2) { left: 75%; top: 20%; animation-delay: 2s; animation-duration: 9s; }
        .jx-particle:nth-child(3) { left: 40%; top: 70%; animation-delay: 4s; animation-duration: 6s; }
        .jx-particle:nth-child(4) { left: 60%; top: 55%; animation-delay: 1s; animation-duration: 10s; }
        .jx-particle:nth-child(5) { left: 85%; top: 65%; animation-delay: 3s; animation-duration: 8s; }

        @keyframes jx-float {
            0%, 100% { opacity: 0; transform: translateY(0) scale(1); }
            25% { opacity: 0.4; }
            50% { opacity: 0.6; transform: translateY(-20px) scale(1.5); }
            75% { opacity: 0.3; }
        }

        /* ============================================================
           Responsive
           ============================================================ */
        @media (max-width: 600px) {
            .jx-status-bar { min-height: 300px; padding: 0 4%; }
            .jx-tree-img { width: 130px; height: 130px; }
            .jx-big { font-size: 48px; }
            .jx-glyph { min-width: 50px; min-height: 240px; padding: 0 2px; }
            .jx-text-gatha { font-size: 15px; max-height: 170px; }
            .jx-text-jifeng { font-size: 17px; max-height: 170px; }
        }

        @media (max-width: 360px) {
            .jx-status-bar { min-height: 260px; padding: 0 5%; }
            .jx-tree-img { width: 100px; height: 100px; }
            .jx-big { font-size: 40px; }
            .jx-glyph { min-width: 40px; min-height: 200px; }
            .jx-text-gatha { font-size: 13px; max-height: 150px; }
            .jx-text-jifeng { font-size: 15px; max-height: 150px; }
        }
    </style>

    <div class="jx-status-bar" id="jx-root">
        <!-- Ambient particles -->
        <div class="jx-particle"></div>
        <div class="jx-particle"></div>
        <div class="jx-particle"></div>
        <div class="jx-particle"></div>
        <div class="jx-particle"></div>

        <!-- LEFT: 偈 -->
        <div class="jx-glyph" onclick="this.classList.toggle('jx-active')">
            <div class="jx-big">偈</div>
            <div class="jx-content">
                <div class="jx-label">佛 偈</div>
                <div class="jx-text-gatha">$1</div>
            </div>
        </div>

        <!-- CENTER: Bodhi Tree -->
        <div class="jx-tree-wrap">
            <div class="jx-tree-glow"></div>
            <div class="jx-mono-layer" id="jx-mono">
                <div class="jx-mono-text">$3</div>
            </div>
            <img class="jx-tree-img" id="jx-tree" src="https://raw.githubusercontent.com/moonquakemo/moonoonon/main/bodhi-tree.png" alt="菩提树" onclick="this.classList.toggle('jx-faded');document.getElementById('jx-mono').classList.toggle('jx-visible')">
        </div>

        <!-- RIGHT: 机 -->
        <div class="jx-glyph" onclick="this.classList.toggle('jx-active')">
            <div class="jx-big">机</div>
            <div class="jx-content">
                <div class="jx-label">机 锋</div>
                <div class="jx-text-jifeng">$2</div>
            </div>
        </div>

        <!-- Toggle pinned to bottom center -->
        <button class="jx-toggle" data-role="toggle" title="切换日/夜">
            <span>☀</span>
        </button>
    </div>

    <script>
    (function() {
        var STORAGE_KEY = 'jx-theme';
        var bars = document.querySelectorAll('.jx-status-bar');
        var root = bars[bars.length - 1];
        if (!root) return;

        // ---- Restore saved theme ----
        var saved = localStorage.getItem(STORAGE_KEY);
        if (saved === 'night') {
            root.classList.add('jx-night');
            var icon = root.querySelector('[data-role="toggle"] span');
            if (icon) icon.textContent = '☽';
        }

        // ---- Sync ALL bars on the page to the saved theme ----
        bars.forEach(function(bar) {
            if (saved === 'night') {
                bar.classList.add('jx-night');
                var ic = bar.querySelector('[data-role="toggle"] span');
                if (ic) ic.textContent = '☽';
            } else {
                bar.classList.remove('jx-night');
                var ic2 = bar.querySelector('[data-role="toggle"] span');
                if (ic2) ic2.textContent = '☀';
            }
        });

        // ---- Toggle handler with persistence ----
        var toggleBtn = root.querySelector('[data-role="toggle"]');
        if (toggleBtn) {
            toggleBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                var isNight = !root.classList.contains('jx-night');
                localStorage.setItem(STORAGE_KEY, isNight ? 'night' : 'day');

                // Apply to ALL status bars on page
                document.querySelectorAll('.jx-status-bar').forEach(function(bar) {
                    bar.classList.toggle('jx-night', isNight);
                    var ic = bar.querySelector('[data-role="toggle"] span');
                    if (ic) ic.textContent = isNight ? '☽' : '☀';
                });
            });
        }
    })();
    </script>

</body>
</html>
